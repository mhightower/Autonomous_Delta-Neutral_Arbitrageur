name: Python CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Entrypoint Smoke Test
      run: uv run python -c "import shutil; assert shutil.which('adna'), 'adna entrypoint not installed'"

    - name: Lint
      run: uv run ruff check --ignore E501 .

    - name: Format Check
      run: uv run ruff format --check .

    - name: Install security tools
      run: pip install bandit pip-audit

    - name: Security Scan (Bandit)
      run: bandit -q -r src

    - name: Dependency Audit (pip-audit)
      run: pip-audit

    - name: Run tests
      run: uv run pytest
